name: Daily Bazaraki Crawl

on:
  schedule:
    # 4× täglich alle 6h (00, 06, 12, 18 UTC). Pro Lauf max 90min Wall-Clock
    # via MAX_RUNTIME_S; Streaming-Architektur persistiert nach jedem Subtype.
    # Mehrere kürzere Läufe statt ein 5h-Marathon: jeder grün, Daten landen
    # inkrementell, kein Datenverlust bei Job-Cancel.
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:
    inputs:
      cities:
        description: "Cities-Filter (kommagetrennt, leer = alle)"
        required: false
        default: ""
      types:
        description: "rent,sale (leer = beide)"
        required: false
        default: ""
      max_pages:
        description: "Max Pages pro City+Type"
        required: false
        default: "60"
      max_runtime_s:
        description: "Wall-Clock-Budget in Sekunden (default 5400 = 90min)"
        required: false
        default: "5400"
      dry_run:
        description: "Nur loggen, kein DB-Write"
        type: boolean
        required: false
        default: false
      skip_details:
        description: "Detail-Page-Drilling überspringen (5x schneller, ohne district/m²/Galerie)"
        type: boolean
        required: false
        default: false
      force_full_drill:
        description: "Auch bereits gedrillte Listings nochmal drillen (Reparatur-Lauf)"
        type: boolean
        required: false
        default: false

concurrency:
  group: bazaraki-crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    # Hard-Cap = MAX_RUNTIME_S/60 + 10min Headroom für SIGTERM-freien exit 0.
    # Default MAX_RUNTIME_S=5400 (90min) → timeout 100min. Backfill-Läufe via
    # workflow_dispatch können MAX_RUNTIME_S=20000 (~5h) setzen, dann hier
    # entsprechend höher. 350 ist GH-Free-Cap.
    timeout-minutes: 100
    defaults:
      run:
        working-directory: ./bazaraki-crawler
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run crawler
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CITIES: ${{ inputs.cities }}
          TYPES: ${{ inputs.types }}
          MAX_PAGES_PER_CITY: ${{ inputs.max_pages || '60' }}
          MAX_RUNTIME_S: ${{ inputs.max_runtime_s || '5400' }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
          SKIP_DETAILS: ${{ inputs.skip_details && '1' || '' }}
          FORCE_FULL_DRILL: ${{ inputs.force_full_drill && '1' || '' }}
        run: python -m src.main
