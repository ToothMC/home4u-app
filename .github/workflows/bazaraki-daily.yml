name: Daily Bazaraki Crawl

on:
  schedule:
    # 04:00 UTC = 06:00 Cyprus Sommerzeit / 07:00 Winterzeit (vor Tagesgeschäft)
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      cities:
        description: "Cities-Filter (kommagetrennt, leer = alle)"
        required: false
        default: ""
      types:
        description: "rent,sale (leer = beide)"
        required: false
        default: ""
      max_pages:
        description: "Max Pages pro City+Type"
        required: false
        default: "60"
      dry_run:
        description: "Nur loggen, kein DB-Write"
        type: boolean
        required: false
        default: false
      skip_details:
        description: "Detail-Page-Drilling überspringen (5x schneller, ohne district/m²/Galerie)"
        type: boolean
        required: false
        default: false
      force_full_drill:
        description: "Auch bereits gedrillte Listings nochmal drillen (Reparatur-Lauf)"
        type: boolean
        required: false
        default: false

concurrency:
  group: bazaraki-crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    # Inkrementelles Drill-Verhalten (siehe main.py): bereits in der DB
    # enriched-te Listings werden nicht nochmal gedrillt. Daily-Lauf =
    # List-Scrape (~30 min) + nur NEUE Listings drillen (~10 min für ~200
    # neue/Tag). Cap deutlich kleiner als 4h. 90 Minuten reichen mit Puffer.
    # FORCE_FULL_DRILL=1 für gelegentliche Reparatur-Läufe braucht 4h+ —
    # dafür diesen Job manuell mit höherem Timeout starten oder separates
    # weekly-full-drill.yml-Workflow.
    timeout-minutes: 90
    defaults:
      run:
        working-directory: ./bazaraki-crawler
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run crawler
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CITIES: ${{ inputs.cities }}
          TYPES: ${{ inputs.types }}
          MAX_PAGES_PER_CITY: ${{ inputs.max_pages || '60' }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
          SKIP_DETAILS: ${{ inputs.skip_details && '1' || '' }}
          FORCE_FULL_DRILL: ${{ inputs.force_full_drill && '1' || '' }}
        run: python -m src.main
