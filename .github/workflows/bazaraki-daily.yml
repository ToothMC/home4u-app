name: Daily Bazaraki Crawl

on:
  schedule:
    # 04:00 UTC = 06:00 Cyprus Sommerzeit / 07:00 Winterzeit (vor Tagesgeschäft)
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      cities:
        description: "Cities-Filter (kommagetrennt, leer = alle)"
        required: false
        default: ""
      types:
        description: "rent,sale (leer = beide)"
        required: false
        default: ""
      max_pages:
        description: "Max Pages pro City+Type"
        required: false
        default: "60"
      dry_run:
        description: "Nur loggen, kein DB-Write"
        type: boolean
        required: false
        default: false
      skip_details:
        description: "Detail-Page-Drilling überspringen (5x schneller, ohne district/m²/Galerie)"
        type: boolean
        required: false
        default: false

concurrency:
  group: bazaraki-crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    # MAX_PAGES_PER_CITY ist seit 5c5086d auf 60 (vorher 30). 5 Städte × 2
    # Types × 60 Pages × ~50 Listings/Page mit Detail-Drilling und 3s-Rate-
    # Limit → 4h reichen nicht mehr. GitHub Actions hat 6h Job-Timeout-
    # Maximum, daher 350 Minuten als Puffer. Wenn das wieder zu eng wird,
    # muss skip_details für Scheduled-Runs Default werden und das tiefe
    # Detail-Drilling auf einen separaten Weekly-Job wandern.
    timeout-minutes: 350
    defaults:
      run:
        working-directory: ./bazaraki-crawler
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run crawler
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CITIES: ${{ inputs.cities }}
          TYPES: ${{ inputs.types }}
          MAX_PAGES_PER_CITY: ${{ inputs.max_pages || '60' }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
          SKIP_DETAILS: ${{ inputs.skip_details && '1' || '' }}
        run: python -m src.main
